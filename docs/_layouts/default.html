<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% seo %}
    <!-- Structured data for Google -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TechArticle",
      "name": "{{ page.title | default: site.title }}",
      "description": "{{ page.description | default: site.description }}",
      "url": "{{ page.url | absolute_url }}",
      "publisher": {
        "@type": "Organization",
        "name": "DSoftStudio",
        "url": "https://dsoftstudio.com"
      },
      "isPartOf": {
        "@type": "WebSite",
        "name": "DSoftStudio Mediator Documentation",
        "url": "{{ site.url }}"
      }
    }
    </script>
    <style>
      /* Override minimal theme fixed-width section */
      .wrapper { max-width: 960px; margin: 0 auto; padding: 20px; width: 100%; }
      section { width: 100%; float: none; padding-bottom: 50px; }
      /* Roboto font family */
      body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
      code, pre { font-family: 'Roboto Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <section>
        {{ content }}
      </section>
    </div>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      // Jekyll renders ```mermaid as <pre><code class="language-mermaid">
      // Mermaid.js needs <pre class="mermaid"> — convert them
      document.querySelectorAll('code.language-mermaid').forEach(code => {
        const pre = code.parentElement;
        pre.className = 'mermaid';
        pre.textContent = code.textContent;
      });
      mermaid.initialize({ startOnLoad: true });
    </script>
  </body>
</html>
