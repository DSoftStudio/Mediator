title: DSoftStudio Docs
description: Documentation for DSoftStudio Mediator
url: https://docs.dsoftstudio.com/mediator
baseurl: ""

# Theme
remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Hide the default header/title — each page has its own
show_downloads: false

# Force custom layout on every page
defaults:
  - scope:
      path: ""
    values:
      layout: default
