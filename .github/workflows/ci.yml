name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  packages: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      # .NET 8 is needed by the sample projects
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DSoftStudio.Mediator.slnx

      - name: Build
        run: dotnet build DSoftStudio.Mediator.slnx -c Release --no-restore

      - name: Test
        run: >
          dotnet test tests/DSoftStudio.Mediator.Tests/DSoftStudio.Mediator.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/**/TestResults/**/*.trx

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: tests/**/TestResults/**/coverage.cobertura.xml

      # Post coverage summary as a PR comment — no external account needed
      - name: Coverage report
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: tests/**/TestResults/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '70 85'

      - name: Add coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: code-coverage-results.md

      - name: Push to GitHub Packages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_PKG_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet nuget push "src/**/bin/Release/*.nupkg"
          --source "https://nuget.pkg.github.com/DSoftStudio/index.json"
          --api-key "$GITHUB_PKG_TOKEN"
          --skip-duplicate

      - name: Push to NuGet.org
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "src/**/bin/Release/*.nupkg"
          --source "https://api.nuget.org/v3/index.json"
          --api-key "$NUGET_API_KEY"
          --skip-duplicate
