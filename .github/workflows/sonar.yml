name: SonarCloud

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Extract project version
        id: version
        run: echo "VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/DSoftStudio.Mediator/DSoftStudio.Mediator.csproj)" >> "$GITHUB_OUTPUT"

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"${{ vars.SONAR_PROJECT_KEY }}"
          /o:"${{ vars.SONAR_ORG }}"
          /v:"${{ steps.version.outputs.VERSION }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          /d:sonar.exclusions="**/obj/**,**/bin/**,samples/**/*,benchmarks/**/*"
          /d:sonar.coverage.exclusions="src/**/DSoftStudio.Mediator.Generators/**"
          /d:sonar.cpd.exclusions="src/**/DSoftStudio.Mediator.Generators/**"
          /d:sonar.issue.ignore.multicriteria="e1,e2,e3"
          /d:sonar.issue.ignore.multicriteria.e1.ruleKey="csharpsquid:S2326"
          /d:sonar.issue.ignore.multicriteria.e1.resourceKey="src/**/I*Request.cs"
          /d:sonar.issue.ignore.multicriteria.e2.ruleKey="csharpsquid:S3267"
          /d:sonar.issue.ignore.multicriteria.e2.resourceKey="src/**/DSoftStudio.Mediator.Generators/**"
          /d:sonar.issue.ignore.multicriteria.e3.ruleKey="csharpsquid:S2743"
          /d:sonar.issue.ignore.multicriteria.e3.resourceKey="src/**/DSoftStudio.Mediator/*Cache.cs"

      - name: Build
        run: dotnet build DSoftStudio.Mediator.slnx -c Release --no-incremental

      - name: Test with coverage
        run: >
          dotnet test DSoftStudio.Mediator.slnx
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory:"./TestResults"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[DSoftStudio.Mediator]*,[DSoftStudio.Mediator.Abstractions]*,[DSoftStudio.Mediator.OpenTelemetry]*,[DSoftStudio.Mediator.FluentValidation]*,[DSoftStudio.Mediator.HybridCache]*"
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*.Tests]*"

      - name: End SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
